services:
  swallow-monitor:
    build: .
    image: swallow-monitor:latest
    container_name: swallow-monitor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Your local config (copy config.example.yaml -> config.yaml first).
      - ./config.yaml:/app/config.yaml:ro
      # Persistent SQLite data. Make sure dbPath in config.yaml is /data/swallow.db
      - swallow-data:/data
    # Health check hits the public overview API.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/me"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  swallow-data:
